<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>24 · Background Orbiting Particles</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { background:#fff; padding:2rem; font-family:'Be Vietnam Pro',sans-serif; }
.particle-stage {
  position:relative;
  background:linear-gradient(135deg,#0a0f1c 0%,#1b1564 50%,#0a0f1c 100%);
  border-radius:16px;
  overflow:hidden;
  height:280px;
  display:flex; align-items:center; justify-content:center;
}
canvas.p-canvas { position:absolute; inset:0; }
.p-center-content {
  position:relative; z-index:2; text-align:center;
}
.p-center-title {
  font-size:clamp(1.4rem,3vw,2rem);
  font-weight:300;
  color:#fff;
  line-height:1.3;
}
.p-center-title strong { color:#ed1b24; font-weight:700; }
.p-center-sub {
  font-size:.8rem; color:rgba(255,255,255,.5);
  margin-top:.5rem; letter-spacing:.06em;
}
.p-badge {
  display:inline-block;
  background:rgba(237,27,36,.2);
  border:1px solid rgba(237,27,36,.4);
  color:#fca5a5;
  font-size:.65rem; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:3px 10px; border-radius:99px;
  margin-bottom:.75rem;
}
</style>
</head>
<body>
<div class="particle-stage">
  <canvas class="p-canvas" id="pCanvas"></canvas>
  <div class="p-center-content">
    <div class="p-badge">AI-Powered</div>
    <div class="p-center-title">Techcombank<br><strong>Intelligence</strong></div>
    <div class="p-center-sub">12.5M customers · real-time decisions</div>
  </div>
</div>

<script>
const canvas = document.getElementById('pCanvas');
const stage  = canvas.parentElement;
const ctx    = canvas.getContext('2d');

function resize(){
  canvas.width  = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

const CX = ()=>canvas.width/2;
const CY = ()=>canvas.height/2;

// Orbits: { r, speed, particles[], color }
const orbits = [
  {r:70,  speed:.008, count:6,  color:'rgba(237,27,36,'},
  {r:105, speed:.005, count:10, color:'rgba(214,185,115,'},
  {r:140, speed:.003, count:14, color:'rgba(99,152,255,'},
];

const particles = [];
orbits.forEach(o=>{
  for(let i=0;i<o.count;i++){
    const angle = (2*Math.PI*i/o.count);
    const size  = 1.5 + Math.random()*2;
    const alpha = .3 + Math.random()*.5;
    particles.push({ r:o.r, angle, speed:o.speed*(Math.random()>.5?1:-1), size, color:o.color, alpha });
  }
});

// extra scattered particles
for(let i=0;i<40;i++){
  particles.push({
    r: 20+Math.random()*160,
    angle: Math.random()*2*Math.PI,
    speed: (Math.random()-.5)*.003,
    size: .5+Math.random(),
    color:'rgba(255,255,255,',
    alpha:.1+Math.random()*.2,
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=CX(),cy=CY();

  // orbit rings (subtle)
  orbits.forEach(o=>{
    ctx.beginPath();
    ctx.arc(cx,cy,o.r,0,2*Math.PI);
    ctx.strokeStyle='rgba(255,255,255,.04)';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  // center glow
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,60);
  grad.addColorStop(0,'rgba(237,27,36,.15)');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // particles
  particles.forEach(p=>{
    p.angle+=p.speed;
    const x=cx+p.r*Math.cos(p.angle);
    const y=cy+p.r*Math.sin(p.angle);
    ctx.beginPath();
    ctx.arc(x,y,p.size,0,2*Math.PI);
    ctx.fillStyle=p.color+p.alpha+')';
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
