<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>16 · Weekly Trend Line</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { background:#fff; padding:2rem; font-family:'Be Vietnam Pro',sans-serif; }
.chart-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; }
.chart-title { font-size:.875rem; font-weight:600; color:#212121; }
.chart-legend { display:flex; gap:1rem; }
.leg { display:flex; align-items:center; gap:.35rem; font-size:.72rem; color:#616161; }
.leg-line { width:20px; height:2.5px; border-radius:2px; }

.chart-svg { width:100%; overflow:visible; display:block; }
.grid-line  { stroke:#e3e4e6; stroke-width:1; }
.axis-label { font-family:'Be Vietnam Pro',sans-serif; font-size:9px; fill:#a2a2a2; }

.data-line {
  fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
  stroke-dasharray:1000; stroke-dashoffset:1000;
  transition:stroke-dashoffset 1.6s cubic-bezier(0.16,1,0.3,1);
}
.area-fill {
  opacity:0; transition:opacity .8s ease .8s;
}
.data-dot {
  opacity:0; transition:opacity .3s ease;
}

.tooltip {
  position:absolute; background:#1b1564; color:#fff;
  padding:.35rem .65rem; border-radius:6px; font-size:.72rem; font-weight:600;
  pointer-events:none; display:none; white-space:nowrap;
}
.chart-wrap { position:relative; }
</style>
</head>
<body>
<div class="chart-header">
  <div>
    <div class="chart-title">Doanh số tuần — Tăng trưởng theo kênh</div>
    <div style="font-size:.72rem;color:#a2a2a2;margin-top:.2rem">16 tuần · tỷ đồng VND</div>
  </div>
  <div class="chart-legend">
    <div class="leg"><div class="leg-line" style="background:#ed1b24"></div>Digital</div>
    <div class="leg"><div class="leg-line" style="background:#1b1564"></div>Branch</div>
    <div class="leg"><div class="leg-line" style="background:#d6b973"></div>Partner</div>
  </div>
</div>
<div class="chart-wrap">
  <svg class="chart-svg" id="chartSvg" viewBox="0 0 560 200" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="tooltip" id="tooltip"></div>
</div>

<script>
const W=560,H=200,PL=32,PR=12,PT=10,PB=28;
const cW=W-PL-PR, cH=H-PT-PB;
const weeks=16;

const data = {
  digital:[22,24,25,28,29,33,35,38,40,42,45,48,50,54,57,62],
  branch: [48,46,47,44,45,43,42,41,40,39,38,36,35,33,32,30],
  partner:[12,13,14,13,15,16,17,18,17,19,20,21,22,23,25,26],
};
const colors = {digital:'#ed1b24',branch:'#1b1564',partner:'#d6b973'};
const maxVal = 65;

const svg = document.getElementById('chartSvg');

// grid
for(let i=0;i<=4;i++){
  const y=PT+cH-(i/4)*cH;
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',PL);l.setAttribute('x2',W-PR);
  l.setAttribute('y1',y);l.setAttribute('y2',y);
  l.setAttribute('class','grid-line');
  if(i===0)l.setAttribute('stroke','#212121');
  svg.appendChild(l);
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',PL-4);t.setAttribute('y',y+3);
  t.setAttribute('text-anchor','end');t.setAttribute('class','axis-label');
  t.textContent=Math.round((i/4)*maxVal);
  svg.appendChild(t);
}
// x labels
['W1','W4','W8','W12','W16'].forEach((lbl,i)=>{
  const xPos=[0,3,7,11,15];
  const x=PL+xPos[i]*(cW/(weeks-1));
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x);t.setAttribute('y',H-4);
  t.setAttribute('text-anchor','middle');t.setAttribute('class','axis-label');
  t.textContent=lbl;svg.appendChild(t);
});

function pts(arr){
  return arr.map((v,i)=>{
    const x=PL+i*(cW/(weeks-1));
    const y=PT+cH-(v/maxVal)*cH;
    return [x,y];
  });
}

Object.entries(data).forEach(([key,arr])=>{
  const p=pts(arr);
  // area
  const areaPath='M'+p[0][0]+','+p[0][1]+p.slice(1).map(([x,y])=>`L${x},${y}`).join('')+
    `L${p[p.length-1][0]},${PT+cH}L${p[0][0]},${PT+cH}Z`;
  const area=document.createElementNS('http://www.w3.org/2000/svg','path');
  area.setAttribute('d',areaPath);
  area.setAttribute('class','area-fill');
  area.setAttribute('fill',colors[key]);
  area.setAttribute('fill-opacity','.06');
  svg.appendChild(area);

  // line
  const d='M'+p[0][0]+','+p[0][1]+p.slice(1).map(([x,y])=>`L${x},${y}`).join('');
  const line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d',d);line.setAttribute('class','data-line');
  line.setAttribute('stroke',colors[key]);
  svg.appendChild(line);

  // dots
  p.forEach(([x,y],i)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r','3.5');
    c.setAttribute('fill',colors[key]);c.setAttribute('class','data-dot');
    svg.appendChild(c);
  });

  setTimeout(()=>{
    line.style.strokeDashoffset='0';
    setTimeout(()=>{
      area.style.opacity='1';
      svg.querySelectorAll('.data-dot').forEach(d=>d.style.opacity='1');
    },600);
  },200);
});
</script>
</body>
</html>
