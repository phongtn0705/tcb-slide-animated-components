<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>18 · Horizontal Bar Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { background:#fff; padding:2rem; font-family:'Be Vietnam Pro',sans-serif; }
.hbar-chart { display:flex; flex-direction:column; gap:.9rem; max-width:500px; }
.hbar-row { display:flex; align-items:center; gap:.75rem; }
.hbar-label { width:120px; font-size:.82rem; font-weight:600; color:#212121; text-align:right; flex-shrink:0; }
.hbar-track { flex:1; height:28px; background:#f5f6f8; border-radius:6px; overflow:hidden; position:relative; }
.hbar-fill {
  height:100%; width:0; border-radius:6px;
  display:flex; align-items:center; padding-left:.75rem;
  transition:width 1.2s cubic-bezier(0.16,1,0.3,1);
  white-space:nowrap;
}
.hbar-fill-label { font-size:.72rem; font-weight:700; color:#fff; opacity:0; transition:opacity .3s ease .9s; }
.hbar-fill.ready .hbar-fill-label { opacity:1; }
.hbar-val { width:48px; font-size:.82rem; font-weight:700; text-align:right; flex-shrink:0; }
</style>
</head>
<body>
<div class="hbar-chart" id="hbarChart">
  <div class="hbar-row"><div class="hbar-label">Hà Nội</div><div class="hbar-track"><div class="hbar-fill" style="background:#ed1b24" data-width="88"><span class="hbar-fill-label">88%</span></div></div><div class="hbar-val" style="color:#ed1b24">88%</div></div>
  <div class="hbar-row"><div class="hbar-label">TP.HCM</div><div class="hbar-track"><div class="hbar-fill" style="background:#1b1564" data-width="82"><span class="hbar-fill-label">82%</span></div></div><div class="hbar-val" style="color:#1b1564">82%</div></div>
  <div class="hbar-row"><div class="hbar-label">Đà Nẵng</div><div class="hbar-track"><div class="hbar-fill" style="background:#4361ee" data-width="61"><span class="hbar-fill-label">61%</span></div></div><div class="hbar-val" style="color:#4361ee">61%</div></div>
  <div class="hbar-row"><div class="hbar-label">Cần Thơ</div><div class="hbar-track"><div class="hbar-fill" style="background:#d6b973" data-width="47"><span class="hbar-fill-label">47%</span></div></div><div class="hbar-val" style="color:#8a6e20">47%</div></div>
  <div class="hbar-row"><div class="hbar-label">Hải Phòng</div><div class="hbar-track"><div class="hbar-fill" style="background:#a2a2a2" data-width="38"><span class="hbar-fill-label">38%</span></div></div><div class="hbar-val" style="color:#a2a2a2">38%</div></div>
</div>
<script>
setTimeout(()=>{
  document.querySelectorAll('.hbar-fill').forEach((f,i)=>{
    setTimeout(()=>{
      f.style.width=f.dataset.width+'%';
      f.classList.add('ready');
    },i*120);
  });
},300);
</script>
</body>
</html>
